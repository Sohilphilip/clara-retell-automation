<!DOCTYPE html>
<html>

<head>

    <title>Select Transcript Types</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f6fa;
        }

        .container {
            width: 700px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        button {
            margin-top: 20px;
            padding: 10px 18px;
            border: none;
            background: #4CAF50;
            color: white;
            border-radius: 4px;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>Select Transcript Type</h2>

        <form action="/process_uploads" method="post">

            <table>

                <tr>
                    <th>File</th>
                    <th>Type</th>
                </tr>

                {% for file in filenames %}

                <tr>

                    <td>{{file}}</td>

                    <td>

                        <select name="{{file}}">
                            <option value="demo">Demo</option>
                            <option value="onboarding">Onboarding</option>
                        </select>

                    </td>

                </tr>

                {% endfor %}

            </table>

            <button type="submit">Process Files</button>

        </form>

    </div>

</body>

</html>
